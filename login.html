<!DOCTYPE html>
<html class="dark" lang="es" data-page="login">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tortillap — Iniciar sesión</title>
<meta name="theme-color" content="#0e0e0e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="/manifest.webmanifest"/>
<link rel="icon" href="/icons/favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
<script>(function(){try{var t=localStorage.getItem("tp-theme");if(t!=="light"&&t!=="dark"){t=window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches?"light":"dark";}var r=document.documentElement;r.classList.toggle("dark",t==="dark");r.classList.toggle("light",t==="light");}catch(e){}})();</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/assets/tw-config.js"></script>
<link rel="stylesheet" href="/assets/theme.css"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-background text-on-background font-body-md min-h-[100dvh] flex flex-col">
<header class="px-margin-mobile md:px-margin-desktop h-16 flex items-center gap-3">
<a href="/index.html" class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl copper-glow">hub</span>
<span class="font-headline-lg text-headline-lg font-bold tracking-tight">Tortillap</span>
</a>
</header>
<main class="flex-1 flex items-center justify-center px-margin-mobile pb-24">
<div class="w-full max-w-md">
<div class="text-center mb-8">
<h1 class="font-display-lg text-[32px] leading-tight mb-2">Bienvenido de nuevo</h1>
<p class="text-on-surface-variant font-body-md">Entra a tu red tortillera.</p>
</div>
<form id="login-form" class="bg-surface-container-low border border-outline-variant/40 rounded-xl p-6 md:p-8 space-y-5 shadow-2xl milled-edge">
<div>
<label class="tp-label" for="email">Correo electrónico</label>
<input class="tp-field" id="email" name="email" type="email" autocomplete="email" required placeholder="tu@correo.mx"/>
</div>
<div>
<label class="tp-label" for="password">Contraseña</label>
<input class="tp-field" id="password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••"/>
</div>
<p id="login-error" class="hidden text-error font-body-md text-sm flex items-center gap-2"><span class="material-symbols-outlined text-base">error</span><span></span></p>
<button type="submit" class="w-full bg-primary-container text-on-primary-container py-4 rounded-xl font-bold font-headline-md text-headline-md copper-glow active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="btn-label">Entrar</span>
<span class="material-symbols-outlined">login</span>
</button>
</form>
<p class="text-center mt-6 text-on-surface-variant">¿Aún no tienes cuenta?
<a href="/registro.html" class="text-primary font-bold copper-glow">Crea la tuya</a>
</p>
<div class="mt-8 p-4 rounded-xl bg-surface-container border border-outline-variant/30 text-sm text-on-surface-variant">
<p class="font-bold text-on-surface mb-1 flex items-center gap-2"><span class="material-symbols-outlined text-base text-primary">admin_panel_settings</span>Acceso de administrador (demo)</p>
<p>Correo: <span class="font-mono text-on-surface">admin@tortillap.mx</span></p>
<p>Contraseña: <span class="font-mono text-on-surface">tortillap2026</span></p>
</div>
</div>
</main>
<script src="/assets/tortillap.js" defer></script>
<script>
  (function () {
    function next() {
      var p = new URLSearchParams(location.search).get('next');
      return p && p.indexOf('/') === 0 ? p : '/perfil.html';
    }
    document.addEventListener('DOMContentLoaded', function () {
      // Already signed in? Skip straight through.
      if (window.TP && TP.store.current()) { location.href = next(); return; }
      var form = document.getElementById('login-form');
      var err = document.getElementById('login-error');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        err.classList.add('hidden');
        var btn = form.querySelector('.btn-label');
        var prev = btn.textContent; btn.textContent = 'Entrando…';
        try {
          var u = await TP.store.login(form.email.value, form.password.value);
          location.href = u.role === 'admin' ? '/admin.html' : next();
        } catch (ex) {
          err.querySelector('span:last-child').textContent = ex.message;
          err.classList.remove('hidden');
          btn.textContent = prev;
        }
      });
    });
  })();
</script>
</body>
</html>
