<!DOCTYPE html>
<html class="dark" lang="es" data-page="admin">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tortillap — Administración</title>
<meta name="theme-color" content="#0e0e0e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="/manifest.webmanifest"/>
<link rel="icon" href="/icons/favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
<script>(function(){try{var t=localStorage.getItem("tp-theme");if(t!=="light"&&t!=="dark"){t=window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches?"light":"dark";}var r=document.documentElement;r.classList.toggle("dark",t==="dark");r.classList.toggle("light",t==="light");}catch(e){}})();</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/assets/tw-config.js"></script>
<link rel="stylesheet" href="/assets/theme.css"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-background text-on-background font-body-md min-h-[100dvh] pb-24">
<header class="px-margin-mobile md:px-margin-desktop h-16 flex items-center justify-between border-b border-outline-variant/20 sticky top-0 z-40 bg-background/85 backdrop-blur-xl">
<a href="/index.html" class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl copper-glow">admin_panel_settings</span>
<span class="font-headline-lg text-headline-lg font-bold tracking-tight">Administración</span>
</a>
<div class="flex items-center gap-4">
<a href="/perfil.html" class="text-on-surface-variant font-label-caps text-label-caps hover:text-primary">MI PERFIL</a>
<button id="logout-btn" class="text-on-surface-variant font-label-caps text-label-caps hover:text-error">SALIR</button>
</div>
</header>

<main class="max-w-5xl mx-auto px-margin-mobile py-6 space-y-8">
<!-- KPIs -->
<section id="kpis" class="grid grid-cols-2 md:grid-cols-4 gap-4"></section>

<!-- Settings -->
<section class="bg-surface-container-low border border-outline-variant/40 rounded-xl p-5">
<h2 class="font-headline-md text-headline-md mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-primary">tune</span>Ajustes de la red</h2>
<label class="flex items-center justify-between py-2 cursor-pointer">
<span><span class="font-bold block">Registro abierto</span><span class="text-on-surface-variant text-sm">Permite que entren nuevos miembros.</span></span>
<input id="set-open" type="checkbox" class="h-6 w-11 appearance-none rounded-full bg-surface-container-high checked:bg-primary-container relative transition-colors cursor-pointer before:content-[''] before:absolute before:top-0.5 before:left-0.5 before:h-5 before:w-5 before:rounded-full before:bg-white before:transition-transform checked:before:translate-x-5"/>
</label>
<label class="flex items-center justify-between py-2 cursor-pointer">
<span><span class="font-bold block">Requiere aprobación</span><span class="text-on-surface-variant text-sm">Los nuevos miembros entran como pendientes.</span></span>
<input id="set-approval" type="checkbox" class="h-6 w-11 appearance-none rounded-full bg-surface-container-high checked:bg-primary-container relative transition-colors cursor-pointer before:content-[''] before:absolute before:top-0.5 before:left-0.5 before:h-5 before:w-5 before:rounded-full before:bg-white before:transition-transform checked:before:translate-x-5"/>
</label>
</section>

<!-- Members -->
<section class="bg-surface-container-low border border-outline-variant/40 rounded-xl p-5">
<div class="flex flex-wrap items-center justify-between gap-3 mb-4">
<h2 class="font-headline-md text-headline-md flex items-center gap-2"><span class="material-symbols-outlined text-primary">groups</span>Miembros</h2>
<div class="flex items-center gap-2">
<button id="export-btn" class="text-sm font-bold text-primary flex items-center gap-1 px-3 py-2 rounded-lg border border-primary/40"><span class="material-symbols-outlined text-base">download</span>Exportar</button>
<button id="add-btn" class="text-sm font-bold text-on-primary-container bg-primary-container flex items-center gap-1 px-3 py-2 rounded-lg copper-glow"><span class="material-symbols-outlined text-base">person_add</span>Nuevo</button>
</div>
</div>
<div class="flex flex-wrap gap-3 mb-4">
<input id="search" class="tp-field flex-1 min-w-[180px]" placeholder="Buscar por nombre, correo o ciudad…"/>
<select id="filter-type" class="tp-field w-auto"><option value="">Todos los tipos</option></select>
</div>
<div id="members" class="space-y-2"></div>
</section>
</main>

<!-- Detail drawer -->
<div id="drawer" class="fixed inset-0 z-50 hidden">
<div id="drawer-bg" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
<div class="absolute bottom-0 inset-x-0 md:inset-y-0 md:right-0 md:left-auto md:w-[420px] bg-surface-container rounded-t-2xl md:rounded-none border-t md:border-l border-outline-variant/40 max-h-[90dvh] overflow-y-auto">
<div id="drawer-body" class="p-6"></div>
</div>
</div>

<script src="/assets/tortillap.js" defer></script>
<script>
(function () {
  'use strict';
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  document.addEventListener('DOMContentLoaded', function () {
    var me = TP.requireAdmin();
    if (!me) return;

    var membersEl = document.getElementById('members');
    var searchEl = document.getElementById('search');
    var filterEl = document.getElementById('filter-type');
    var drawer = document.getElementById('drawer');
    var drawerBody = document.getElementById('drawer-body');

    // type filter options
    filterEl.innerHTML = '<option value="">Todos los tipos</option>' +
      TP.PROFILE_TYPES.map(function (t) { return '<option value="' + t.id + '">' + t.label + '</option>'; }).join('');

    // settings
    var settings = TP.store.settings();
    var openEl = document.getElementById('set-open'), apprEl = document.getElementById('set-approval');
    openEl.checked = settings.registrationOpen; apprEl.checked = settings.requireApproval;
    function saveSettings() {
      TP.store.saveSettings({ registrationOpen: openEl.checked, requireApproval: apprEl.checked });
    }
    openEl.addEventListener('change', saveSettings);
    apprEl.addEventListener('change', saveSettings);

    function kpis() {
      var users = TP.store.users();
      var today = new Date(); today.setHours(0, 0, 0, 0);
      var newToday = users.filter(function (u) { return u.createdAt >= today.getTime(); }).length;
      var states = {}; users.forEach(function (u) { if (u.location && u.location.state) states[u.location.state] = 1; });
      var suspended = users.filter(function (u) { return u.status === 'suspended'; }).length;
      var data = [
        ['groups', users.length, 'Miembros'],
        ['map', Object.keys(states).length, 'Estados'],
        ['fiber_new', newToday, 'Altas hoy'],
        ['block', suspended, 'Suspendidos'],
      ];
      document.getElementById('kpis').innerHTML = data.map(function (d) {
        return '<div class="bg-surface-container-low border border-outline-variant/40 rounded-xl p-4">' +
          '<span class="material-symbols-outlined text-primary copper-glow">' + d[0] + '</span>' +
          '<div class="font-display-lg text-[28px] leading-none mt-2 text-primary">' + d[1] + '</div>' +
          '<div class="font-label-caps text-label-caps uppercase text-on-surface-variant mt-1">' + d[2] + '</div></div>';
      }).join('');
    }

    function list() {
      var q = searchEl.value.trim().toLowerCase();
      var ft = filterEl.value;
      var users = TP.store.users().filter(function (u) {
        if (ft && u.type !== ft) return false;
        if (!q) return true;
        var hay = [u.name, u.email, u.location && u.location.city, u.location && u.location.state].join(' ').toLowerCase();
        return hay.indexOf(q) !== -1;
      }).sort(function (a, b) { return b.createdAt - a.createdAt; });

      if (!users.length) { membersEl.innerHTML = '<p class="text-on-surface-variant py-6 text-center">Sin resultados.</p>'; return; }

      membersEl.innerHTML = users.map(function (u) {
        var badge = u.status === 'suspended'
          ? '<span class="text-error text-xs font-bold px-2 py-0.5 rounded-full bg-error/10">Suspendido</span>'
          : (u.role === 'admin' ? '<span class="text-primary text-xs font-bold px-2 py-0.5 rounded-full bg-primary/10">Admin</span>' : '');
        return '<button data-id="' + u.id + '" class="member-row w-full flex items-center gap-3 p-3 rounded-xl bg-surface-container hover:bg-surface-container-high transition-all text-left">' +
          '<span class="h-10 w-10 rounded-full grid place-items-center text-white font-bold text-sm shrink-0" style="background:' + u.avatarColor + '">' + TP.initials(u.name) + '</span>' +
          '<span class="flex-1 min-w-0"><span class="font-bold block truncate">' + esc(u.name) + ' ' + badge + '</span>' +
          '<span class="text-on-surface-variant text-sm block truncate">' + esc(TP.typeLabel(u.type)) + ' · ' + esc((u.location && u.location.city) || '—') + '</span></span>' +
          '<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span></button>';
      }).join('');

      membersEl.querySelectorAll('.member-row').forEach(function (row) {
        row.addEventListener('click', function () { openDrawer(row.getAttribute('data-id')); });
      });
    }

    function openDrawer(id) {
      var u = TP.store.byId(id);
      if (!u) return;
      var b = u.business || {}, l = u.location || {};
      var isMe = u.id === me.id;
      drawerBody.innerHTML =
        '<div class="flex items-center justify-between mb-4">' +
        '<div class="flex items-center gap-3"><span class="h-12 w-12 rounded-full grid place-items-center text-white font-bold" style="background:' + u.avatarColor + '">' + TP.initials(u.name) + '</span>' +
        '<div><div class="font-headline-md text-headline-md">' + esc(u.name) + '</div>' +
        '<div class="text-on-surface-variant text-sm">' + esc(TP.typeLabel(u.type)) + '</div></div></div>' +
        '<button id="drawer-close" class="material-symbols-outlined text-on-surface-variant">close</button></div>' +
        '<div class="space-y-1 text-sm mb-5">' +
        kv('Correo', u.email) + kv('Teléfono', u.phone) + kv('Negocio', b.tradeName) +
        kv('Ubicación', [l.city, l.state].filter(Boolean).join(', ')) +
        kv('Alta', new Date(u.createdAt).toLocaleDateString('es-MX')) + kv('ID', u.id) + '</div>' +
        '<div class="space-y-3">' +
        '<div><label class="tp-label">Rol</label><select id="d-role" class="tp-field"' + (isMe ? ' disabled' : '') + '>' +
        '<option value="member"' + (u.role === 'member' ? ' selected' : '') + '>Miembro</option>' +
        '<option value="admin"' + (u.role === 'admin' ? ' selected' : '') + '>Administrador</option></select>' +
        (isMe ? '<p class="text-on-surface-variant text-xs mt-1">No puedes cambiar tu propio rol.</p>' : '') + '</div>' +
        '<div><label class="tp-label">Estado</label><select id="d-status" class="tp-field"' + (isMe ? ' disabled' : '') + '>' +
        '<option value="active"' + (u.status === 'active' ? ' selected' : '') + '>Activo</option>' +
        '<option value="suspended"' + (u.status === 'suspended' ? ' selected' : '') + '>Suspendido</option></select></div>' +
        '<button id="d-save" class="w-full py-3 rounded-xl bg-primary-container text-on-primary-container font-bold copper-glow mt-2">Guardar cambios</button>' +
        (isMe ? '' : '<button id="d-delete" class="w-full py-3 rounded-xl border border-error/50 text-error font-bold flex items-center justify-center gap-1"><span class="material-symbols-outlined text-base">delete</span>Eliminar miembro</button>') +
        '</div>';
      drawer.classList.remove('hidden');
      document.getElementById('drawer-close').addEventListener('click', closeDrawer);
      document.getElementById('d-save').addEventListener('click', function () {
        TP.store.update(u.id, { role: document.getElementById('d-role').value, status: document.getElementById('d-status').value });
        closeDrawer(); refresh();
      });
      var del = document.getElementById('d-delete');
      if (del) del.addEventListener('click', function () {
        if (confirm('¿Eliminar a ' + u.name + '? Esta acción no se puede deshacer.')) {
          TP.store.remove(u.id); closeDrawer(); refresh();
        }
      });
    }
    function kv(k, v) { return v ? '<div class="flex justify-between gap-3 py-1.5 border-b border-outline-variant/15"><span class="text-on-surface-variant">' + esc(k) + '</span><span class="font-medium text-right break-all">' + esc(v) + '</span></div>' : ''; }
    function closeDrawer() { drawer.classList.add('hidden'); }
    document.getElementById('drawer-bg').addEventListener('click', closeDrawer);

    function refresh() { kpis(); list(); }

    // controls
    searchEl.addEventListener('input', list);
    filterEl.addEventListener('change', list);
    document.getElementById('logout-btn').addEventListener('click', function () { TP.store.logout(); location.href = '/index.html'; });
    document.getElementById('export-btn').addEventListener('click', function () {
      var data = JSON.stringify(TP.store.users().map(function (u) { var c = Object.assign({}, u); delete c.passhash; return c; }), null, 2);
      var blob = new Blob([data], { type: 'application/json' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'tortillap-miembros.json';
      a.click(); URL.revokeObjectURL(a.href);
    });
    document.getElementById('add-btn').addEventListener('click', async function () {
      var name = prompt('Nombre del nuevo miembro:'); if (!name) return;
      var email = prompt('Correo:'); if (!email) return;
      if (TP.store.findByEmail(email)) { alert('Ya existe una cuenta con ese correo.'); return; }
      var pass = prompt('Contraseña temporal:', 'tortillap'); if (!pass) return;
      var keep = TP.store.current();
      await TP.store.register({ type: 'tortilleria', name: name, email: email, password: pass });
      if (keep) TP.store.setSession(keep.id); // registration auto-logs-in; restore admin session
      refresh();
    });

    refresh();
  });
})();
</script>
</body>
</html>
