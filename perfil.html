<!DOCTYPE html>
<html class="dark" lang="es" data-page="perfil">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tortillap — Mi perfil</title>
<meta name="theme-color" content="#0e0e0e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="/manifest.webmanifest"/>
<link rel="icon" href="/icons/favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
<script>(function(){try{var t=localStorage.getItem("tp-theme");if(t!=="light"&&t!=="dark"){t=window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches?"light":"dark";}var r=document.documentElement;r.classList.toggle("dark",t==="dark");r.classList.toggle("light",t==="light");}catch(e){}})();</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/assets/tw-config.js"></script>
<link rel="stylesheet" href="/assets/theme.css"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-background text-on-background font-body-md min-h-[100dvh] pb-32">
<header class="px-margin-mobile md:px-margin-desktop h-16 flex items-center justify-between border-b border-outline-variant/20">
<a href="/index.html" class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl copper-glow">hub</span>
<span class="font-headline-lg text-headline-lg font-bold tracking-tight">Tortillap</span>
</a>
<button id="logout-btn" class="text-on-surface-variant font-label-caps text-label-caps hover:text-error flex items-center gap-1">
<span class="material-symbols-outlined text-base">logout</span>SALIR
</button>
</header>

<main id="profile-root" class="max-w-2xl mx-auto px-margin-mobile py-6 space-y-6"></main>

<!-- Bottom nav -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-2xl rounded-full z-50 bg-surface-container/90 backdrop-blur-2xl border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex justify-around items-center h-20 px-4">
<a class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:text-primary transition-all" href="/red.html"><span class="material-symbols-outlined">map</span><span class="font-label-caps text-label-caps mt-1">Red</span></a>
<a class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:text-primary transition-all" href="/beneficios.html"><span class="material-symbols-outlined">loyalty</span><span class="font-label-caps text-label-caps mt-1">Beneficios</span></a>
<a class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:text-primary transition-all" href="/mercado.html"><span class="material-symbols-outlined">shopping_cart</span><span class="font-label-caps text-label-caps mt-1">Mercado</span></a>
<a class="flex flex-col items-center justify-center text-primary bg-primary/10 rounded-full p-2" href="/perfil.html"><span class="material-symbols-outlined copper-glow">person</span><span class="font-label-caps text-label-caps mt-1">Perfil</span></a>
</nav>

<script src="/assets/tortillap.js" defer></script>
<script>
(function () {
  'use strict';
  function esc(s){ return (s||'').replace(/[&<>"]/g, function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  document.addEventListener('DOMContentLoaded', function () {
    var u = TP.requireAuth();
    if (!u) return;
    var root = document.getElementById('profile-root');
    var welcome = new URLSearchParams(location.search).get('welcome');

    function infoRow(icon, label, value) {
      if (!value) return '';
      return '<div class="flex items-start gap-3 py-2.5 border-b border-outline-variant/20 last:border-0">' +
        '<span class="material-symbols-outlined text-on-surface-variant text-xl">' + icon + '</span>' +
        '<div><div class="font-label-caps text-label-caps text-on-surface-variant uppercase">' + label + '</div>' +
        '<div class="font-body-md">' + esc(value) + '</div></div></div>';
    }

    function view() {
      var b = u.business || {}, l = u.location || {};
      var welcomeBanner = welcome ?
        '<div class="rounded-xl bg-primary/10 border border-primary/30 p-4 flex items-center gap-3">' +
        '<span class="material-symbols-outlined text-primary copper-glow">celebration</span>' +
        '<div><div class="font-bold">¡Bienvenida a la red, ' + esc(u.name.split(' ')[0]) + '!</div>' +
        '<div class="text-on-surface-variant text-sm">Tu perfil de ' + esc(TP.typeLabel(u.type)) + ' ya está activo.</div></div></div>' : '';

      var adminLink = u.role === 'admin' ?
        '<a href="/admin.html" class="flex items-center justify-between p-4 rounded-xl bg-surface-container-low border border-primary/30 hover:border-primary transition-all">' +
        '<span class="flex items-center gap-3 font-bold"><span class="material-symbols-outlined text-primary">admin_panel_settings</span>Panel de administración</span>' +
        '<span class="material-symbols-outlined text-primary">arrow_forward</span></a>' : '';

      var mapPin = (l.lat != null) ?
        '<div class="mt-4 rounded-xl overflow-hidden border border-outline-variant/40">' +
        '<div class="relative h-32" style="background:rgb(var(--surface-container-high));background-image:radial-gradient(circle at 50% 45%,rgba(217,119,6,.20),transparent 60%);">' +
        '<span class="material-symbols-outlined text-primary copper-glow absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-full text-4xl">location_on</span></div>' +
        '<div class="p-2.5 bg-surface-container-low font-mono-data text-mono-data text-on-surface-variant">Lat ' + l.lat.toFixed(4) + ', Lng ' + l.lng.toFixed(4) + '</div></div>' : '';

      root.innerHTML =
        welcomeBanner +
        // Membership card
        '<div class="relative overflow-hidden rounded-xl p-6 text-on-primary-fixed" style="background:linear-gradient(135deg,#ffd9a8,#ffb77d 55%,#d97706);">' +
        '<div class="flex items-center justify-between">' +
        '<div class="flex items-center gap-4">' +
        '<div class="h-16 w-16 rounded-full grid place-items-center text-white font-bold text-xl shadow-lg" style="background:' + u.avatarColor + '">' + TP.initials(u.name) + '</div>' +
        '<div><div class="font-headline-lg text-headline-lg leading-tight">' + esc(u.name) + '</div>' +
        '<div class="font-label-caps text-label-caps uppercase tracking-widest opacity-80">' + esc(TP.typeLabel(u.type)) + '</div></div></div>' +
        '<span class="material-symbols-outlined text-3xl opacity-80">hub</span></div>' +
        '<div class="mt-6 flex items-end justify-between">' +
        '<div><div class="font-label-caps text-label-caps uppercase opacity-70">Miembro desde</div>' +
        '<div class="font-bold">' + new Date(u.createdAt).toLocaleDateString('es-MX', { month: 'long', year: 'numeric' }) + '</div></div>' +
        '<div class="font-mono-data text-mono-data opacity-70">' + u.id.toUpperCase() + '</div></div></div>' +
        adminLink +
        // Account
        '<div class="bg-surface-container-low border border-outline-variant/40 rounded-xl p-5">' +
        '<div class="flex items-center justify-between mb-2"><h2 class="font-headline-md text-headline-md">Cuenta</h2>' +
        '<button id="edit-btn" class="text-primary font-bold flex items-center gap-1"><span class="material-symbols-outlined text-base">edit</span>Editar</button></div>' +
        infoRow('person', 'Nombre', u.name) + infoRow('mail', 'Correo', u.email) + infoRow('call', 'Teléfono', u.phone) + '</div>' +
        // Business
        ((b.tradeName || b.description) ?
          '<div class="bg-surface-container-low border border-outline-variant/40 rounded-xl p-5">' +
          '<h2 class="font-headline-md text-headline-md mb-2">' + (u.type === 'aliado' ? 'Mi interés' : 'Mi negocio') + '</h2>' +
          infoRow('storefront', 'Nombre comercial', b.tradeName) + infoRow('category', 'Categoría', b.category) +
          infoRow('calendar_today', 'Años', b.years) + infoRow('groups', 'Equipo', b.employees) +
          infoRow('production_quantity_limits', 'Capacidad', b.output) + infoRow('description', 'Descripción', b.description) + '</div>' : '') +
        // Location
        '<div class="bg-surface-container-low border border-outline-variant/40 rounded-xl p-5">' +
        '<h2 class="font-headline-md text-headline-md mb-2">Ubicación</h2>' +
        infoRow('map', 'Estado', l.state) + infoRow('location_city', 'Ciudad', l.city) + infoRow('home_pin', 'Dirección', l.address) +
        mapPin + '</div>';

      var eb = document.getElementById('edit-btn');
      if (eb) eb.addEventListener('click', edit);
    }

    function f(id, label, value, type) {
      return '<div><label class="tp-label" for="' + id + '">' + label + '</label>' +
        '<input id="' + id + '" type="' + (type||'text') + '" class="tp-field" value="' + esc(value||'') + '"/></div>';
    }

    function edit() {
      var b = u.business || {}, l = u.location || {};
      var stateOpts = TP.STATES.map(function (s) { return '<option' + (l.state === s ? ' selected' : '') + '>' + s + '</option>'; }).join('');
      root.innerHTML =
        '<div class="bg-surface-container-low border border-outline-variant/40 rounded-xl p-5 space-y-4">' +
        '<h2 class="font-headline-md text-headline-md">Editar perfil</h2>' +
        f('e-name', 'Nombre', u.name) + f('e-phone', 'Teléfono', u.phone, 'tel') +
        f('e-trade', 'Nombre comercial', b.tradeName) +
        '<div><label class="tp-label" for="e-desc">Descripción</label><textarea id="e-desc" rows="3" class="tp-field resize-none">' + esc(b.description||'') + '</textarea></div>' +
        '<div><label class="tp-label" for="e-state">Estado</label><select id="e-state" class="tp-field"><option value="">—</option>' + stateOpts + '</select></div>' +
        f('e-city', 'Ciudad', l.city) + f('e-address', 'Dirección', l.address) +
        '<div class="flex gap-3 pt-2">' +
        '<button id="cancel-btn" class="flex-1 py-3 rounded-xl border border-outline-variant/60 font-bold">Cancelar</button>' +
        '<button id="save-btn" class="flex-1 py-3 rounded-xl bg-primary-container text-on-primary-container font-bold copper-glow">Guardar</button>' +
        '</div></div>';
      document.getElementById('cancel-btn').addEventListener('click', view);
      document.getElementById('save-btn').addEventListener('click', function () {
        function v(id){ return document.getElementById(id).value; }
        u = TP.store.update(u.id, {
          name: v('e-name').trim() || u.name,
          phone: v('e-phone').trim(),
          business: Object.assign({}, u.business, { tradeName: v('e-trade').trim(), description: v('e-desc').trim() }),
          location: Object.assign({}, u.location, { state: v('e-state'), city: v('e-city').trim(), address: v('e-address').trim() }),
        });
        welcome = null;
        view();
      });
    }

    document.getElementById('logout-btn').addEventListener('click', function () {
      TP.store.logout();
      location.href = '/index.html';
    });

    view();
  });
})();
</script>
</body>
</html>
